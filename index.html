<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copilot Lab | Registro de Proyectos</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #05060a;
      --bg-surface: #0f111a;
      --accent-red: #ff3c3c;
      --accent-glow: rgba(255, 60, 60, 0.35);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-hover: rgba(255, 255, 255, 0.06);
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 60, 60, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 60, 60, 0.03) 0%, transparent 40%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 60, 60, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 60, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 60, 60, 0); } }

    .animate-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Header Section */
    .header {
      text-align: center;
      margin-bottom: 4rem;
      max-width: 600px;
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent-red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* Main Container */
    .main-card {
      width: 100%;
      max-width: 800px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 32px;
      padding: 3rem;
      position: relative;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
    }

    .main-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 32px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent, rgba(255, 60, 60, 0.2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .section-title span {
      width: 40px;
      height: 2px;
      background: var(--accent-red);
      display: block;
    }

    /* Form Styles */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .full { grid-column: 1 / -1; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select, textarea {
      background: var(--glass);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-red);
      background: var(--glass-hover);
      box-shadow: 0 0 20px rgba(255, 60, 60, 0.1);
    }

    textarea { min-height: 120px; resize: none; }

    /* Custom Level Selector */
    .level-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .level-option {
      cursor: pointer;
      background: var(--glass);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 1.5rem 1rem;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .level-option input { display: none; }

    .level-option .icon {
      font-size: 1.8rem;
      margin-bottom: 10px;
      display: block;
      filter: grayscale(1) opacity(0.5);
      transition: all 0.3s ease;
    }

    .level-option .title {
      font-weight: 600;
      font-size: 0.95rem;
      display: block;
      margin-bottom: 4px;
    }

    .level-option .desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: block;
    }

    .level-option:hover {
      background: var(--glass-hover);
      transform: translateY(-5px);
      border-color: rgba(255,255,255,0.2);
    }

    /* Selected States */
    .level-option.active[data-type="Básico"] { border-color: #64748b; background: rgba(100, 116, 139, 0.1); }
    .level-option.active[data-type="Básico"] .icon { filter: none; opacity: 1; }

    .level-option.active[data-type="Intermedio"] { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
    .level-option.active[data-type="Intermedio"] .icon { filter: none; opacity: 1; }

    .level-option.active[data-type="Completo"] { border-color: var(--accent-red); background: rgba(255, 60, 60, 0.1); }
    .level-option.active[data-type="Completo"] .icon { filter: none; opacity: 1; }

    /* Button */
    .btn-container {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
    }

    .submit-btn {
      background: var(--accent-red);
      color: white;
      border: none;
      padding: 1.2rem 3rem;
      border-radius: 100px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    .submit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px var(--accent-glow);
      filter: brightness(1.1);
    }

    .submit-btn:disabled {
      background: #334155;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Results Table */
    .results-section {
      margin-top: 5rem;
      width: 100%;
      max-width: 800px;
      display: none;
    }

    .table-card {
      background: var(--glass);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 1.2rem 1.5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
    }

    tr:last-child td { border: none; }

    .tag {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--glass-hover);
    }

    /* Success Overlay */
    #success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 6, 10, 0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .level-selector { grid-template-columns: 1fr; }
      .main-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <header class="header animate-in">
    <h1>Copilot Lab<span>.</span></h1>
    <p>Comparte tu visión. Transforma tu flujo de trabajo con Inteligencia Artificial.</p>
  </header>

  <main class="main-card animate-in" style="animation-delay: 0.1s">
    <h2 class="section-title"><span></span> Propuesta de Proyecto</h2>
    
    <form id="projectForm">
      <div class="grid">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej. Carlos" required>
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Ej. Ruiz" required>
        </div>

        <div class="form-group full">
          <label for="grupo">¿En qué grupo estás trabajando?</label>
          <select id="grupo" required>
            <option value="" disabled selected>Selecciona tu equipo</option>
            <option>Equipo 01</option><option>Equipo 02</option><option>Equipo 03</option>
            <option>Equipo 04</option><option>Equipo 05</option><option>Equipo 06</option>
            <option>Equipo 07</option><option>Equipo 08</option><option>Equipo 09</option>
            <option>Equipo 10</option>
          </select>
        </div>

        <div class="form-group full">
          <label for="proyecto">¿Cómo planeas usar Copilot?</label>
          <select id="proyecto" required>
            <option value="" disabled selected>Elige un área de enfoque</option>
            <optgroup label="Optimización de Datos">
              <option value="Reportes">Automatización de informes y datos</option>
              <option value="Dashboards">Creación de tableros visuales</option>
            </optgroup>
            <optgroup label="Productividad">
              <option value="Flujos">Hacer tareas manuales más rápido</option>
              <option value="Desarrollo">Asistencia en programación y código</option>
            </optgroup>
            <optgroup label="Diseño & Contenido">
              <option value="Multimedia">Generación de imágenes y video</option>
              <option value="Textos">Redacción creativa y resúmenes</option>
            </optgroup>
            <option value="Otro">Tengo otra propuesta innovadora</option>
          </select>
        </div>

        <div class="form-group full">
          <label>¿Qué tantas funciones tienes hoy?</label>
          <div class="level-selector" id="levelSelector">
            <label class="level-option" data-type="Básico">
              <input type="radio" name="nivel" value="Básico" required>
              <span class="icon">🔘</span>
              <span class="title">Básico</span>
              <span class="desc">Solo chat estándar</span>
            </label>
            <label class="level-option" data-type="Intermedio">
              <input type="radio" name="nivel" value="Intermedio">
              <span class="icon">🔶</span>
              <span class="title">Intermedio</span>
              <span class="desc">M365 + Web</span>
            </label>
            <label class="level-option" data-type="Completo">
              <input type="radio" name="nivel" value="Completo">
              <span class="icon">🔥</span>
              <span class="title">Completo</span>
              <span class="desc">Todo habilitado</span>
            </label>
          </div>
        </div>

        <div class="form-group full">
          <label for="descripcion">¿Cuál es tu expectativa principal?</label>
          <textarea id="descripcion" placeholder="Describe brevemente qué esperas lograr con esta herramienta..."></textarea>
        </div>
      </div>

      <div class="btn-container">
        <button type="submit" class="submit-btn" id="submitBtn">
          <span>Enviar Propuesta</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </form>
  </main>

  <section class="results-section animate-in" id="resultsSection">
    <h2 class="section-title"><span></span> Lab Log</h2>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Participante</th>
            <th>Equipo</th>
            <th>Enfoque</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>
      </table>
    </div>
  </section>

  <div id="success-overlay">
    <div class="success-icon">✓</div>
    <h2 style="font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 10px;">¡Recibido!</h2>
    <p style="color: var(--text-muted);">Tu propuesta ya está en el sistema.</p>
    <button onclick="closeSuccess()" style="margin-top: 30px; background: transparent; border: 1px solid var(--border-color); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Cerrar</button>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyH94RoIKHwdRquQvnYNXrm20DLZAjNb-_4FZcdthvQrj9_5xRwbZP1tHZlym-lvGGOQA/exec';
    
    const form = document.getElementById('projectForm');
    const submitBtn = document.getElementById('submitBtn');
    const levelOptions = document.querySelectorAll('.level-option');
    const successOverlay = document.getElementById('success-overlay');
    
    let db = JSON.parse(localStorage.getItem('lab_records_v3') || '[]');

    // Custom Radio Selection Logic
    levelOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        levelOptions.forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        opt.querySelector('input').checked = true;
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        nombre: document.getElementById('nombre').value.trim(),
        apellido: document.getElementById('apellido').value.trim(),
        grupo: document.getElementById('grupo').value,
        proyecto: document.getElementById('proyecto').value,
        nivel: document.querySelector('input[name="nivel"]:checked').value,
        descripcion: document.getElementById('descripcion').value.trim(),
        fecha: new Date().toLocaleDateString()
      };

      submitBtn.disabled = true;
      submitBtn.querySelector('span').textContent = 'Procesando...';

      try {
        db.push(data);
        localStorage.setItem('lab_records_v3', JSON.stringify(db));

        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        successOverlay.style.display = 'flex';
        form.reset();
        levelOptions.forEach(o => o.classList.remove('active'));
        renderTable();
      } catch (err) {
        alert('Hubo un problema al enviar. Intenta de nuevo.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.querySelector('span').textContent = 'Enviar Propuesta';
      }
    });

    function renderTable() {
      const tbody = document.getElementById('dataTable');
      if (db.length > 0) document.getElementById('resultsSection').style.display = 'block';
      tbody.innerHTML = db.reverse().slice(0, 5).map(p => `
        <tr>
          <td><div style="font-weight:600">${p.nombre} ${p.apellido}</div><div style="font-size:0.7rem; color:var(--text-muted)">${p.fecha}</div></td>
          <td><span class="tag">${p.grupo}</span></td>
          <td style="color:var(--accent-red); font-weight:500">${p.proyecto}</td>
        </tr>
      `).join('');
    }

    function closeSuccess() {
      successOverlay.style.display = 'none';
    }

    if(db.length > 0) renderTable();
  </script>
</body>
</html>
