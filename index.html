<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copilot Project Lab | Registro de Intención</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0b10;
      --card-bg: #15171e;
      --accent: #3b82f6; /* Modern Blue */
      --accent-glow: rgba(59, 130, 246, 0.5);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #2d333f;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --input-bg: #1e212b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ── Navbar ── */
    .nav {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 11, 16, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-brand span {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      border: 1px solid rgba(59, 130, 246, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Container ── */
    .container {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input, select, textarea {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: #232733;
    }

    select { cursor: pointer; }

    /* ── Custom Radio Buttons ── */
    .radio-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 5px;
    }

    .radio-card {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .radio-card input { display: none; }

    .radio-card .icon { font-size: 1.2rem; display: block; margin-bottom: 5px; }
    .radio-card .label { font-size: 0.8rem; font-weight: 600; display: block; }
    .radio-card .sub { font-size: 0.7rem; color: var(--text-secondary); display: block; }

    .radio-card:hover { border-color: rgba(255,255,255,0.2); background: #232733; }

    .radio-card.active[data-level="Muy limitado"] { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
    .radio-card.active[data-level="Acceso parcial"] { border-color: var(--warning); background: rgba(245, 158, 11, 0.1); }
    .radio-card.active[data-level="Acceso completo"] { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-submit:hover {
      background: #2563eb;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Table Section ── */
    .results-card {
      margin-top: 3rem;
      display: none;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-row input, .filter-row select {
      flex: 1;
      min-width: 150px;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      background: #1e212b;
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td { border-bottom: none; }

    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-blue { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
    .badge-purple { background: rgba(139, 92, 246, 0.1); color: #a78bfa; }
    .badge-gray { background: rgba(148, 163, 184, 0.1); color: #cbd5e1; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      background: var(--success);
      color: white;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: translateY(100px);
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 1000;
    }

    #toast.show { transform: translateY(0); }
    #toast.error { background: var(--error); }

    /* ── Loader ── */
    .loader {
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .radio-group { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Copilot<span>Lab</span></div>
  <div class="status-tag">Status: 2024 Intake</div>
</nav>

<div class="container">
  <div class="header">
    <h1>Propuesta de Proyecto</h1>
    <p>Registra tu intención de uso de IA Generativa en la clase</p>
  </div>

  <div class="card">
    <div class="card-title">🚀 Formulario de Registro</div>
    
    <form id="projectForm">
      <div class="form-grid">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required>
        </div>
        <div class="field">
          <label>Apellido</label>
          <input type="text" id="apellido" placeholder="Tu apellido" required>
        </div>
        
        <div class="field full">
          <label>Grupo de Trabajo</label>
          <select id="grupo" required>
            <option value="" disabled selected>Selecciona tu grupo</option>
            <option>Grupo 1</option><option>Grupo 2</option><option>Grupo 3</option>
            <option>Grupo 4</option><option>Grupo 5</option><option>Grupo 6</option>
            <option>Grupo 7</option><option>Grupo 8</option><option>Grupo 9</option>
            <option>Grupo 10</option>
          </select>
        </div>

        <div class="field full">
          <label>Intención del Proyecto</label>
          <select id="proyecto" required>
            <option value="" disabled selected>¿Qué esperas crear?</option>
            <optgroup label="Análisis & Datos">
              <option value="analysis">Análisis de datos automático</option>
              <option value="dashboard">Dashboard de visualización</option>
            </optgroup>
            <optgroup label="Automatización">
              <option value="automation">Flujos de trabajo automáticos</option>
              <option value="coding">Asistente de desarrollo / código</option>
            </optgroup>
            <optgroup label="Contenido & Creatividad">
              <option value="content">Generación de contenido dinámico</option>
              <option value="multimedia">Generación de imágenes/video</option>
              <option value="presentation">Optimización de presentaciones</option>
            </optgroup>
            <option value="other">Otro tipo de proyecto</option>
          </select>
        </div>

        <div class="field full">
          <label>Nivel de Acceso actual a Copilot</label>
          <div class="radio-group" id="radioGroup">
            <label class="radio-card" data-level="Muy limitado">
              <input type="radio" name="nivel" value="Muy limitado" required>
              <span class="icon">🔒</span>
              <span class="label">Muy limitado</span>
              <span class="sub">Solo texto básico</span>
            </label>
            <label class="radio-card" data-level="Acceso parcial">
              <input type="radio" name="nivel" value="Acceso parcial">
              <span class="icon">🔓</span>
              <span class="label">Acceso parcial</span>
              <span class="sub">M365 parcial</span>
            </label>
            <label class="radio-card" data-level="Acceso completo">
              <input type="radio" name="nivel" value="Acceso completo">
              <span class="icon">⚡</span>
              <span class="label">Acceso completo</span>
              <span class="sub">Plugins + Imágenes</span>
            </label>
          </div>
        </div>

        <div class="field full">
          <label>Breve descripción del alcance</label>
          <textarea id="descripcion" placeholder="¿Cuál es el objetivo principal de tu proyecto?"></textarea>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="loader" id="loader"></span>
        <span id="btnText">Enviar Registro</span>
      </button>
    </form>
  </div>

  <!-- Vista de Resultados -->
  <div class="card results-card" id="resultsCard">
    <div class="card-title">📊 Proyectos Registrados</div>
    
    <div class="filter-row">
      <input type="text" id="searchName" placeholder="Filtrar por nombre...">
      <select id="filterGrupo">
        <option value="">Todos los grupos</option>
        <option>Grupo 1</option><option>Grupo 2</option><option>Grupo 3</option>
        <option>Grupo 4</option><option>Grupo 5</option><option>Grupo 6</option>
        <option>Grupo 7</option><option>Grupo 8</option><option>Grupo 9</option>
        <option>Grupo 10</option>
      </select>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Estudiante</th>
            <th>Grupo</th>
            <th>Proyecto</th>
            <th>Acceso</th>
          </tr>
        </thead>
        <tbody id="dataTable">
          <!-- Datos dinámicos -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ────────────────────────────────────────────
  // CONFIGURACIÓN GOOGLE SHEETS
  // ────────────────────────────────────────────
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyH94RoIKHwdRquQvnYNXrm20DLZAjNb-_4FZcdthvQrj9_5xRwbZP1tHZlym-lvGGOQA/exec';
  // ────────────────────────────────────────────

  const form = document.getElementById('projectForm');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const loader = document.getElementById('loader');
  const toast = document.getElementById('toast');
  const radioCards = document.querySelectorAll('.radio-card');
  
  let projects = JSON.parse(localStorage.getItem('copilot_lab_records') || '[]');

  // Visual selector for radios
  radioCards.forEach(card => {
    card.addEventListener('click', () => {
      radioCards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nivel = document.querySelector('input[name="nivel"]:checked')?.value;
    if(!nivel) {
      showToast('Por favor selecciona tu nivel de acceso', true);
      return;
    }

    const formData = {
      nombre: document.getElementById('nombre').value.trim(),
      apellido: document.getElementById('apellido').value.trim(),
      grupo: document.getElementById('grupo').value,
      proyecto: document.getElementById('proyecto').value,
      nivel: nivel,
      descripcion: document.getElementById('descripcion').value.trim(),
      fecha: new Date().toLocaleString()
    };

    // UI Loading state
    submitBtn.disabled = true;
    loader.style.display = 'inline-block';
    btnText.textContent = 'Procesando...';

    try {
      // 1. Guardar Local
      projects.push(formData);
      localStorage.setItem('copilot_lab_records', JSON.stringify(projects));

      // 2. Enviar a Sheets
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // Necesario para Google Scripts
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });

      showToast('¡Registro completado con éxito!');
      form.reset();
      radioCards.forEach(c => c.classList.remove('active'));
      renderTable();
      document.getElementById('resultsCard').style.display = 'block';

    } catch (error) {
      console.error(error);
      showToast('Error al conectar con la base de datos.', true);
    } finally {
      submitBtn.disabled = false;
      loader.style.display = 'none';
      btnText.textContent = 'Enviar Registro';
    }
  });

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'show error' : 'show';
    setTimeout(() => toast.className = '', 3500);
  }

  // Table Logic
  const searchInput = document.getElementById('searchName');
  const grupoFilter = document.getElementById('filterGrupo');

  function renderTable() {
    const tableBody = document.getElementById('dataTable');
    const search = searchInput.value.toLowerCase();
    const grupo = grupoFilter.value;

    const filtered = projects.filter(p => {
      const matchName = (p.nombre + ' ' + p.apellido).toLowerCase().includes(search);
      const matchGrupo = grupo === '' || p.grupo === grupo;
      return matchName && matchGrupo;
    });

    if(filtered.length > 0) {
      document.getElementById('resultsCard').style.display = 'block';
    }

    tableBody.innerHTML = filtered.map(p => `
      <tr>
        <td>
          <div style="font-weight:600">${p.nombre} ${p.apellido}</div>
          <div style="font-size:0.75rem; color:var(--text-secondary)">${p.fecha}</div>
        </td>
        <td><span class="badge badge-gray">${p.grupo}</span></td>
        <td><span class="badge badge-blue">${p.proyecto}</span></td>
        <td><span class="badge ${p.nivel === 'Acceso completo' ? 'badge-purple' : 'badge-gray'}">${p.nivel}</span></td>
      </tr>
    `).join('');
  }

  searchInput.addEventListener('input', renderTable);
  grupoFilter.addEventListener('change', renderTable);

  // Initial Load
  if(projects.length > 0) renderTable();
</script>

</body>
</html>
