<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copilot Project Lab | Registro de Intención</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0b10;
      --card-bg: #15171e;
      --accent: #ff4d4d; /* Cyber Red */
      --accent-glow: rgba(255, 77, 77, 0.4);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border: #2d333f;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ff4d4d;
      --input-bg: #1e212b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ── Navbar ── */
    .nav {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 11, 16, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-brand span {
      background: linear-gradient(135deg, #ff4d4d, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Container ── */
    .container {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), #8b5cf6);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    input, select, textarea {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 77, 77, 0.15);
      background: #232733;
    }

    /* ── Custom Radio Buttons ── */
    .radio-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 5px;
    }

    .radio-card {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .radio-card input { display: none; }
    .radio-card .icon { font-size: 1.2rem; display: block; margin-bottom: 5px; }
    .radio-card .label { font-size: 0.8rem; font-weight: 600; display: block; }
    .radio-card .sub { font-size: 0.7rem; color: var(--text-secondary); display: block; }

    .radio-card:hover { border-color: rgba(255,255,255,0.2); background: #232733; }
    .radio-card.active[data-level="Muy limitado"] { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
    .radio-card.active[data-level="Acceso parcial"] { border-color: var(--warning); background: rgba(245, 158, 11, 0.1); }
    .radio-card.active[data-level="Acceso completo"] { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-submit:hover {
      background: #ff3333;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Results Section ── */
    .results-card {
      margin-top: 3rem;
      display: none;
    }

    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      background: #1e212b;
      padding: 1rem;
      text-align: left;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    td { padding: 1rem; border-bottom: 1px solid var(--border); }

    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-gray { background: rgba(148, 163, 184, 0.1); color: #cbd5e1; }
    .badge-red { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      background: var(--success);
      color: white;
      font-weight: 600;
      transform: translateY(100px);
      transition: transform 0.3s;
      z-index: 1000;
      display: none;
    }

    #toast.show { display: block; transform: translateY(0); }
    #toast.error { background: var(--error); }

    .loader {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .radio-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Copilot<span>Lab</span></div>
</nav>

<div class="container">
  <div class="header">
    <h1>Laboratorio de Proyectos</h1>
    <p>Cuéntanos cómo planeas usar la IA para mejorar tu trabajo</p>
  </div>

  <div class="card">
    <div class="card-title">📝 Tu Propuesta</div>
    
    <form id="projectForm">
      <div class="form-grid">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="nombre" placeholder="Escribe tu nombre" required>
        </div>
        <div class="field">
          <label>Apellido</label>
          <input type="text" id="apellido" placeholder="Escribe tu apellido" required>
        </div>
        
        <div class="field full">
          <label>¿A qué grupo perteneces?</label>
          <select id="grupo" required>
            <option value="" disabled selected>Selecciona tu grupo</option>
            <option>Grupo 1</option><option>Grupo 2</option><option>Grupo 3</option>
            <option>Grupo 4</option><option>Grupo 5</option><option>Grupo 6</option>
            <option>Grupo 7</option><option>Grupo 8</option><option>Grupo 9</option>
            <option>Grupo 10</option>
          </select>
        </div>

        <div class="field full">
          <label>¿En qué te gustaría usar Copilot?</label>
          <select id="proyecto" required>
            <option value="" disabled selected>Elige una opción</option>
            <optgroup label="Datos e Informes">
              <option value="Organizar datos">Organizar datos o crear reportes automáticos</option>
              <option value="Panel visual">Crear un panel visual con información</option>
            </optgroup>
            <optgroup label="Ahorro de Tiempo">
              <option value="Tareas repetitivas">Hacer tareas repetitivas más rápido</option>
              <option value="Código">Ayuda para escribir o corregir código</option>
            </optgroup>
            <optgroup label="Creatividad y Textos">
              <option value="Textos">Escribir correos, artículos o resúmenes</option>
              <option value="Multimedia">Crear imágenes o videos</option>
              <option value="Diapositivas">Mejorar el diseño de mis diapositivas</option>
            </optgroup>
            <option value="Otro">Tengo otra idea en mente</option>
          </select>
        </div>

        <div class="field full">
          <label>¿Qué tantas funciones tienes activas hoy en Copilot?</label>
          <div class="radio-group" id="radioGroup">
            <label class="radio-card" data-level="Muy limitado">
              <input type="radio" name="nivel" value="Muy limitado" required>
              <span class="icon">🔒</span>
              <span class="label">Básico</span>
              <span class="sub">Solo puedo chatear</span>
            </label>
            <label class="radio-card" data-level="Acceso parcial">
              <input type="radio" name="nivel" value="Acceso parcial">
              <span class="icon">🔓</span>
              <span class="label">Intermedio</span>
              <span class="sub">Tengo herramientas extra</span>
            </label>
            <label class="radio-card" data-level="Acceso completo">
              <input type="radio" name="nivel" value="Acceso completo">
              <span class="icon">⚡</span>
              <span class="label">Completo</span>
              <span class="sub">Tengo todo habilitado</span>
            </label>
          </div>
        </div>

        <div class="field full">
          <label>¿Cuál es tu expectativa con este proyecto?</label>
          <textarea id="descripcion" placeholder="Cuéntanos de forma sencilla qué esperas lograr o qué problema quieres resolver..."></textarea>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="loader" id="loader"></span>
        <span id="btnText">Enviar mi propuesta</span>
      </button>
    </form>
  </div>

  <div class="card results-card" id="resultsCard">
    <div class="card-title">📊 Proyectos Registrados</div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Estudiante</th>
            <th>Grupo</th>
            <th>Expectativa</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyH94RoIKHwdRquQvnYNXrm20DLZAjNb-_4FZcdthvQrj9_5xRwbZP1tHZlym-lvGGOQA/exec';
  
  const form = document.getElementById('projectForm');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const loader = document.getElementById('loader');
  const toast = document.getElementById('toast');
  const radioCards = document.querySelectorAll('.radio-card');
  
  let projects = JSON.parse(localStorage.getItem('copilot_lab_records') || '[]');

  radioCards.forEach(card => {
    card.addEventListener('click', () => {
      radioCards.forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nivel = document.querySelector('input[name="nivel"]:checked')?.value;
    
    const formData = {
      nombre: document.getElementById('nombre').value.trim(),
      apellido: document.getElementById('apellido').value.trim(),
      grupo: document.getElementById('grupo').value,
      proyecto: document.getElementById('proyecto').value,
      nivel: nivel,
      descripcion: document.getElementById('descripcion').value.trim(),
      fecha: new Date().toLocaleString()
    };

    submitBtn.disabled = true;
    loader.style.display = 'inline-block';
    btnText.textContent = 'Enviando...';

    try {
      projects.push(formData);
      localStorage.setItem('copilot_lab_records', JSON.stringify(projects));

      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });

      showToast('¡Enviado con éxito!');
      form.reset();
      radioCards.forEach(c => c.classList.remove('active'));
      renderTable();
    } catch (error) {
      showToast('Error al enviar.', true);
    } finally {
      submitBtn.disabled = false;
      loader.style.display = 'none';
      btnText.textContent = 'Enviar mi propuesta';
    }
  });

  function showToast(msg, isError = false) {
    toast.textContent = msg;
    toast.className = isError ? 'show error' : 'show';
    setTimeout(() => toast.className = '', 3000);
  }

  function renderTable() {
    const tableBody = document.getElementById('dataTable');
    if (projects.length > 0) document.getElementById('resultsCard').style.display = 'block';
    tableBody.innerHTML = projects.map(p => `
      <tr>
        <td><strong>${p.nombre} ${p.apellido}</strong></td>
        <td><span class="badge badge-gray">${p.grupo}</span></td>
        <td><span style="color:var(--text-secondary);font-size:0.8rem">${p.descripcion || p.proyecto}</span></td>
      </tr>
    `).join('');
  }

  if(projects.length > 0) renderTable();
</script>
</body>
</html>
